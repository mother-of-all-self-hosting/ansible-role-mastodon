# The path at which frontend is exposed
mastodon_frontend_path_prefix: "/"

mastodon_frontend_container_image: "{{ mastodon_frontend_container_image_registry_prefix }}mastodon/mastodon/frontend:{{ mastodon_frontend_container_image_tag }}"
mastodon_frontend_container_image_tag: "{{ mastodon_frontend_version }}"
mastodon_frontend_container_image_registry_prefix: "{{ mastodon_frontend_container_image_registry_prefix_upstream }}"
mastodon_frontend_container_image_registry_prefix_upstream: "{{ mastodon_frontend_container_image_registry_prefix_upstream_default }}"
mastodon_frontend_container_image_registry_prefix_upstream_default: ghcr.io/
mastodon_frontend_container_image_force_pull: "{{ mastodon_frontend_container_image.endswith(':latest') }}"

