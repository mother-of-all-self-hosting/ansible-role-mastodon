---
# The command to output encryption secrets: ansible-playbook -i inventory/hosts setup.yml --tags=secrets-encryption-mastodon

- name: Run Mastodon 'bin/rails db:encryption:init' command
  ansible.builtin.command:
    cmd: |-
      {{ devture_systemd_docker_base_host_command_docker }} run --rm
      --user={{ mastodon_uid }}:{{ mastodon_gid }}
      {{ mastodon_web_container_image }}
      bin/rails db:encryption:init
  register: mastodon_secrets_encryption_result
  changed_when: mastodon_secrets_encryption_result.rc == 0

- name: Extract ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
  ansible.builtin.set_fact:
    mastodon_active_record_encryption_deterministic_key: "{{ mastodon_secrets_encryption_result.stdout | regex_search('ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=([^\\n]+)') | regex_replace('ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=', '') }}"

- name: Extract ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
  ansible.builtin.set_fact:
    mastodon_active_record_encryption_key_derivation_salt: "{{ mastodon_secrets_encryption_result.stdout | regex_search('ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=([^\\n]+)') | regex_replace('ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=', '') }}"

- name: Extract ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
  ansible.builtin.set_fact:
    mastodon_active_record_encryption_primary_key: "{{ mastodon_secrets_encryption_result.stdout | regex_search('ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=([^\\n]+)') | regex_replace('ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=', '') }}"

# `devture_playbook_runtime_messages_list` is used as it conveniently respects line breaks.
- name: Show the encryption secrets for Mastodon
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Set the values below to the variables for encryption secrets:

          - `" + mastodon_active_record_encryption_deterministic_key + "` to `mastodon_environment_variables_active_record_encryption_deterministic_key`
          - `" + mastodon_active_record_encryption_key_derivation_salt + "` to `mastodon_environment_variables_active_record_encryption_key_derivation_salt`
          - `" + mastodon_active_record_encryption_primary_key + "` to `mastodon_environment_variables_active_record_encryption_primary_key`

          Do NOT change these secrets once in use, as it would cause data loss and other issues."
        ]
      }}
