---
- name: Ensure Mastodon systemd services are stopped and removed
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/remove_service.yml"
  with_items:
    - service: "{{ mastodon_frontend_identifier }}.service"
      path: "{{ devture_systemd_docker_base_systemd_path }}/{{ mastodon_frontend_identifier }}.service"
    - service: "{{ mastodon_sidekiq_identifier }}.service"
      path: "{{ devture_systemd_docker_base_systemd_path }}/{{ mastodon_sidekiq_identifier }}.service"

- name: Ensure Mastodon container network does not exist
  when: mastodon_container_network_deletion_enabled
  block:
    - name: Ensure Mastodon container network does not exist via community.docker.docker_network
      when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
      community.docker.docker_network:
        name: "{{ mastodon_container_network }}"
        state: absent

    - name: Ensure Mastodon container network does not exist via ansible.builtin.command
      when: devture_systemd_docker_base_container_network_creation_method == 'command'
      ansible.builtin.command:
        cmd: >-
          {{ devture_systemd_docker_base_host_command_docker }} network rm
          {{ mastodon_container_network }}
      register: network_deletion_result
      failed_when: network_deletion_result.rc > 0 and 'not found' not in network_deletion_result.stderr
      changed_when: mastodon_container_network in network_deletion_result.stdout

- name: Remove Mastodon Sidekiq files
  block:
    - name: Ensure Mastodon Sidekiq support files do not exist
      ansible.builtin.file:
        path: "{{ mastodon_sidekiq_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Mastodon Sidekiq local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ mastodon_sidekiq_data_path }}"
      register: mastodon_sidekiq_data_path_deletion_result
      changed_when: mastodon_sidekiq_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Mastodon Sidekiq base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ mastodon_sidekiq_base_path }}"
      register: mastodon_sidekiq_base_path_deletion_result
      changed_when: mastodon_sidekiq_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Check existence of Mastodon Sidekiq local data path
      ansible.builtin.stat:
        path: "{{ mastodon_sidekiq_data_path }}"
      register: mastodon_sidekiq_data_path_stat

    # We just want to notify the user. Deleting data is too destructive.
    - name: Inject the message about the remaining Mastodon Sidekiq local data path
      when: mastodon_sidekiq_data_path_stat.stat.exists | bool
      ansible.builtin.set_fact:
        devture_playbook_runtime_messages_list: |
          {{
            devture_playbook_runtime_messages_list | default([])
            +
            [
              "Note: As the local Mastodon instance has been removed, some old data remains in `" + mastodon_sidekiq_data_path + "`. Feel free to delete it."
            ]
          }}

- name: Remove Mastodon frontend files
  block:
    - name: Ensure Mastodon frontend path does not exist
      ansible.builtin.file:
        path: "{{ mastodon_frontend_base_path }}"
        state: absent
