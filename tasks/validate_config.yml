---
- name: Fail if required Mastodon settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - mastodon_uid
    - mastodon_gid
    - mastodon_hostname
    - mastodon_container_network
    - mastodon_backend_environment_variables_hd_session_secret
    - mastodon_frontend_path_prefix

- name: Fail if Mastodon database type invalid
  ansible.builtin.fail:
    msg: >-
      mastodon_database_type must be 'mariadb', 'postgres'. Currently 'sqlite' is not supported by this role.
  when: "mastodon_database_type not in ['mariadb', 'postgres']"

- name: Fail if required Mastodon + MariaDB integration settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) when `mastodon_database_type` is `mariadb`
  when: "mastodon_database_type == 'mariadb' and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - mastodon_database_mariadb_hostname
    - mastodon_database_mariadb_password

- name: Fail if required Mastodon + Postgres integration settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) when `mastodon_database_type` is `postgres`
  when: "mastodon_database_type == 'postgres' and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - mastodon_database_postgres_hostname
    - mastodon_database_postgres_password

- name: Run if Traefik is enabled for the backend
  when: mastodon_backend_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Mastodon backend are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - mastodon_backend_container_labels_traefik_hostname
        - mastodon_backend_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `mastodon_backend_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if mastodon_backend_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          mastodon_backend_container_labels_traefik_path_prefix (`{{ mastodon_backend_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/mastodon`).
      when: "mastodon_backend_container_labels_traefik_path_prefix != '/' and mastodon_backend_container_labels_traefik_path_prefix[-1] == '/'"

- name: Run if Traefik is enabled for frontend
  when: mastodon_frontend_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Mastodon frontend are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - mastodon_frontend_container_labels_traefik_hostname
        - mastodon_frontend_container_labels_traefik_path_prefix

    - name: Fail if mastodon_frontend_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          mastodon_frontend_container_labels_traefik_path_prefix (`{{ mastodon_frontend_container_labels_traefik_path_prefix }}`) must be `/`.
          Mastodon does not support hosting under a subpath yet.
      when: "mastodon_frontend_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `mastodon_frontend_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if mastodon_frontend_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          mastodon_frontend_container_labels_traefik_path_prefix (`{{ mastodon_frontend_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/mastodon`).
      when: "mastodon_frontend_container_labels_traefik_path_prefix != '/' and mastodon_frontend_container_labels_traefik_path_prefix[-1] == '/'"
