---
- name: Fail if required Mastodon settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`).
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "mastodon_uid", when: true }
    - { "name": "mastodon_gid", when: true }
    - { "name": "mastodon_hostname", when: true }
    - { "name": "mastodon_sidekiq_path_prefix", when: true }
    - { "name": "mastodon_streaming_path_prefix", when: true }
    - { "name": "mastodon_web_path_prefix", when: true }
    - { "name": "mastodon_container_network", when: true }
    - { "name": "mastodon_database_socket_path_host", when: "{{ mastodon_database_socket_enabled }}" }
    - { "name": "mastodon_database_hostname", when: "{{ not mastodon_database_socket_enabled }}" }
    - { "name": "mastodon_database_password", when: true }
    - { "name": "mastodon_redis_hostname", when: true }
    - { "name": "mastodon_environment_variables_local_domain", when: true }

- name: Fail if required Mastodon secrets and keys not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
      The values for them can be obtained by running the playbook with the `secrets-all-mastodon` tag.
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - mastodon_environment_variables_secret_key_base
    - mastodon_environment_variables_active_record_encryption_deterministic_key
    - mastodon_environment_variables_active_record_encryption_key_derivation_salt
    - mastodon_environment_variables_active_record_encryption_primary_key
    - mastodon_environment_variables_vapid_private_key
    - mastodon_environment_variables_vapid_public_key

- name: Run if Traefik is enabled for the Sidekiq
  when: mastodon_sidekiq_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Mastodon Sidekiq are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - mastodon_sidekiq_container_labels_traefik_hostname
        - mastodon_sidekiq_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `mastodon_sidekiq_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if mastodon_sidekiq_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          mastodon_sidekiq_container_labels_traefik_path_prefix (`{{ mastodon_sidekiq_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/mastodon`).
      when: "mastodon_sidekiq_container_labels_traefik_path_prefix != '/' and mastodon_sidekiq_container_labels_traefik_path_prefix[-1] == '/'"

- name: Run if Traefik is enabled for the streaming API server
  when: mastodon_streaming_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Mastodon streaming API server are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - mastodon_streaming_container_labels_traefik_hostname
        - mastodon_streaming_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `mastodon_streaming_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if mastodon_streaming_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          mastodon_streaming_container_labels_traefik_path_prefix (`{{ mastodon_streaming_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/mastodon`).
      when: "mastodon_streaming_container_labels_traefik_path_prefix != '/' and mastodon_streaming_container_labels_traefik_path_prefix[-1] == '/'"

- name: Run if Traefik is enabled for the web process service
  when: mastodon_web_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Mastodon streaming are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - mastodon_web_container_labels_traefik_hostname
        - mastodon_web_container_labels_traefik_path_prefix

    - name: Fail if mastodon_web_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          mastodon_web_container_labels_traefik_path_prefix (`{{ mastodon_web_container_labels_traefik_path_prefix }}`) must be `/`.
          Mastodon does not support hosting under a subpath yet.
      when: "mastodon_web_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `mastodon_web_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if mastodon_web_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          mastodon_web_container_labels_traefik_path_prefix (`{{ mastodon_web_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/mastodon`).
      when: "mastodon_web_container_labels_traefik_path_prefix != '/' and mastodon_web_container_labels_traefik_path_prefix[-1] == '/'"
