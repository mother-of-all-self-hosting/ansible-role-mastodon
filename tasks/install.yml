---
- name: Ensure HedgeDoc paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ hedgedoc_uid }}"
    group: "{{ hedgedoc_gid }}"
  with_items:
    - "{{ hedgedoc_base_path }}"
    - "{{ hedgedoc_backend_base_path }}"
    - "{{ hedgedoc_backend_data_path }}"
    - "{{ hedgedoc_backend_uploads_path }}"
    - "{{ hedgedoc_frontend_base_path }}"

- name: Ensure HedgeDoc support files installed
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0640"
    owner: "{{ hedgedoc_uid }}"
    group: "{{ hedgedoc_gid }}"
  with_items:
    - { src: "{{ role_path }}/templates/env_backend.j2", dest: "{{ hedgedoc_backend_base_path }}/env" }
    - { src: "{{ role_path }}/templates/env_frontend.j2", dest: "{{ hedgedoc_frontend_base_path }}/env" }
    - { src: "{{ role_path }}/templates/labels_backend.j2", dest: "{{ hedgedoc_backend_base_path }}/labels" }
    - { src: "{{ role_path }}/templates/labels_frontend.j2", dest: "{{ hedgedoc_frontend_base_path }}/labels" }
  register: hedgedoc_support_files_result

- name: Ensure HedgeDoc container images are pulled
  community.docker.docker_image:
    name: "{{ item }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
  with_items:
    - "{{ hedgedoc_backend_container_image }}"
    - "{{ hedgedoc_frontend_container_image }}"
  register: hedgedoc_container_images_pull_result
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: hedgedoc_container_images_pull_result is not failed

- name: Ensure HedgeDoc container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ hedgedoc_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: hedgedoc_network_creation_result

- name: Ensure HedgeDoc container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ hedgedoc_container_network }}
  register: hedgedoc_network_creation_result
  changed_when: hedgedoc_network_creation_result.rc == 0
  failed_when: hedgedoc_network_creation_result.rc != 0 and 'already exists' not in hedgedoc_network_creation_result.stderr

- name: Ensure HedgeDoc systemd services are present
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  with_items:
    - src: "{{ role_path }}/templates/systemd/hedgedoc-backend.service.j2"
      dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ hedgedoc_backend_identifier }}.service"
    - src: "{{ role_path }}/templates/systemd/hedgedoc-frontend.service.j2"
      dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ hedgedoc_frontend_identifier }}.service"
  register: hedgedoc_systemd_services_result

- name: Determine whether HedgeDoc needs a restart
  ansible.builtin.set_fact:
    hedgedoc_restart_necessary: >-
      {{
        hedgedoc_support_files_result.changed | default(false)
        or hedgedoc_systemd_services_result.changed | default(false)
        or hedgedoc_container_images_pull_result.changed | default(false)
      }}
