---
# The command to output the secret: ansible-playbook -i inventory/hosts setup.yml --tags=secret-mastodon

- name: Run Mastodon 'bundle exec rails secret' command
  ansible.builtin.command:
    cmd: |-
      {{ devture_systemd_docker_base_host_command_docker }} run --rm
      --user={{ mastodon_uid }}:{{ mastodon_gid }}
      {{ mastodon_web_container_image }}
      bundle exec rails secret
  register: mastodon_secret_result
  changed_when: mastodon_secret_result.rc == 0

- name: Extract SECRET_KEY_BASE
  ansible.builtin.set_fact:
    mastodon_secret_key_base: "{{ mastodon_secret_result.stdout }}"

- name: Show the secret for Mastodon
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Set the value below to the variable for the secret key base:

          - `" + mastodon_secret_key_base + "` to `mastodon_environment_variables_secret_key_base`"
        ]
      }}
