---
- name: Ensure Mastodon web service is started
  ansible.builtin.service:
    name: "{{ mastodon_web_identifier }}"
    state: started
    daemon_reload: true
  register: start_result

- name: Wait a while, so that the Mastodon instance can manage to start
  ansible.builtin.pause:
    seconds: 7
  when: "start_result.changed"

- name: Ensure Mastodon users are created
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/util/ensure_user_registered.yml"
  with_items: "{{ mastodon_users }}"
  loop_control:
    loop_var: user
  no_log: true
